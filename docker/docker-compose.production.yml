# Production stack — runs on VPS behind Nginx.
# All environment is driven by apps/backend/.env
#
#   docker compose -f docker/docker-compose.production.yml up -d --build
#
# Set MINIO_PUBLIC_ENDPOINT to your VPS IP or domain in .env so that
# MinIO pre-signed URLs are reachable from the browser.

services:

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: finskool-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      finskool-backend:
        condition: service_healthy
      finskool-frontend:
        condition: service_started

  # ── Backend ────────────────────────────────────────────────────────────────
  finskool-backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    image: finskool-backend:latest
    container_name: finskool-backend
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_PUBLIC_PORT: "9002"
      # Set this to your VPS public IP or domain so browser can reach MinIO
      # MINIO_PUBLIC_ENDPOINT: your-vps-ip-or-domain
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    volumes:
      - finskool-seed-flag:/data/seed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:'+(process.env.PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Notifications worker ───────────────────────────────────────────────────
  finskool-worker:
    image: finskool-backend:latest
    container_name: finskool-worker
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    command: ["node", "dist/worker.js"]
    volumes:
      # Shares the same seed-flag volume as finskool-backend: the image's
      # ENTRYPOINT (docker-entrypoint.sh) runs `npm run db:seed` on first boot
      # if this flag is missing. finskool-backend always starts (and seeds)
      # first — this service depends on it being healthy — so by the time this
      # container starts, the flag already exists here and seeding is skipped.
      # Without this mount, seed.ts (which re-uploads cover images to MinIO on
      # every run, not fully idempotent) would re-run on every worker restart.
      - finskool-seed-flag:/data/seed
    depends_on:
      finskool-backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  finskool-frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    image: finskool-frontend:latest
    container_name: finskool-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ""   # empty = same origin, nginx proxies /api/ to backend
    depends_on:
      - finskool-backend

  # ── Mail (SMTP) ────────────────────────────────────────────────────────────
  # MailHog catches outbound SMTP traffic and shows it in a web UI — it does
  # NOT deliver mail to real inboxes. Swap SMTP_HOST/PORT (and add SMTP_USER/
  # SMTP_PASSWORD) in .env to point at a real relay (SES/SendGrid/Mailgun/etc.)
  # when real delivery to users' inboxes is needed.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: finskool-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI — view "sent" mail at http://<host>:8025

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finskool-postgres
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - finskool-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finskool-redis
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - finskool-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: finskool-minio
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9002}:9000"         # expose S3 API so browser can PUT directly
      - "${MINIO_CONSOLE_PORT:-9003}:9001" # MinIO web console
    volumes:
      - finskool-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ───────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: finskool-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../apps/backend/.env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} &&
      echo 'minio bucket ${MINIO_BUCKET} ready'
      "
    restart: "no"

volumes:
  finskool-postgres-data:
    name: finskool-postgres-data
  finskool-redis-data:
    name: finskool-redis-data
  finskool-minio-data:
    name: finskool-minio-data
  finskool-seed-flag:
    name: finskool-seed-flag
