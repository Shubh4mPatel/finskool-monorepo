services:
  postgres:
    image: postgres:16-alpine
    container_name: finskool-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: finskool
      POSTGRES_USER: finskool
      POSTGRES_PASSWORD: finskool_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - finskool-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finskool -d finskool"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finskool-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass finskool_redis_pass
    volumes:
      - finskool-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "finskool_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: finskool-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: finskool_minio
      MINIO_ROOT_PASSWORD: finskool_minio_pass
    command: server /data --console-address ":9001"
    volumes:
      - finskool-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finskool-postgres-data:
    name: finskool-postgres-data
  finskool-redis-data:
    name: finskool-redis-data
  finskool-minio-data:
    name: finskool-minio-data
