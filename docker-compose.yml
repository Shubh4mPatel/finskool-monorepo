# All-in-one stack: builds and runs the backend as a single container,
# together with its Postgres / Redis / MinIO dependencies.
# Everything is driven by .env (same directory).
#
#   docker compose up -d --build
#
# NOTE: reuses the same container names/volumes as docker-compose.dev.yml, so
# stop that first if it's running:  docker compose -f docker-compose.dev.yml down
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: finskool-backend:latest
    container_name: finskool-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Inside the compose network, reach services by name — these override the
      # localhost-based values in .env (which are for running the app on the host).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:'+(process.env.PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  postgres:
    image: postgres:16-alpine
    container_name: finskool-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - finskool-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finskool-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - finskool-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: finskool-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT}:9000"            # S3 API
      - "${MINIO_CONSOLE_PORT}:9001"    # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - finskool-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: creates the bucket the app uploads to and makes objects readable.
  minio-init:
    image: minio/mc:latest
    container_name: finskool-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} &&
      echo 'minio bucket ${MINIO_BUCKET} ready'
      "
    restart: "no"

volumes:
  finskool-postgres-data:
    name: finskool-postgres-data
  finskool-redis-data:
    name: finskool-redis-data
  finskool-minio-data:
    name: finskool-minio-data
