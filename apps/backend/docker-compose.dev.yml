# Full dev stack: the Express server (hot-reload) + Postgres / Redis / MinIO.
# All ports/credentials are interpolated from .env (same directory).
#
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Source is bind-mounted into the backend container, so edits on the host
# trigger an automatic restart via nodemon/tsx.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: finskool-backend-dev:latest
    container_name: finskool-backend-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # Inside the compose network, reach services by name (override .env's localhost values).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_ENDPOINT: localhost
      MINIO_PORT: "9000"
      # Browser-facing URLs must use the host-mapped port (.env's MINIO_PORT), not the
      # in-network port above — otherwise uploaded image URLs are unreachable from outside.
      MINIO_PUBLIC_PORT: "${MINIO_PORT}"
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    ports:
      - "${PORT}:${PORT}"
    volumes:
      # Live-reload: host source over the image, but keep the image's node_modules.
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./prisma.config.ts:/app/prisma.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: finskool-backend-dev:latest
    container_name: finskool-worker-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev:worker"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./prisma.config.ts:/app/prisma.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: finskool-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - finskool-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finskool-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - finskool-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: finskool-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT}:9000"            # S3 API
      - "${MINIO_CONSOLE_PORT}:9001"    # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - finskool-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: creates the bucket the app uploads to and makes objects readable,
  # so host-run `npm run dev` uploads work against this infra.
  minio-init:
    image: minio/mc:latest
    container_name: finskool-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} &&
      echo 'minio bucket ${MINIO_BUCKET} ready'
      "
    restart: "no"

volumes:
  finskool-postgres-data:
    name: finskool-postgres-data
  finskool-redis-data:
    name: finskool-redis-data
  finskool-minio-data:
    name: finskool-minio-data
